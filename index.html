<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Page</title>
    <style>
        body {
            background-color: #8A8A6A;
            color: #fff;
            font-family: 'Special Elite', monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .header {
            font-size: 26px;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
        }
        .login-container {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
            margin-bottom: 20px;
        }
        input {
            background-color: #e0e0e0;
            border: none;
            padding: 12px;
            font-size: 16px;
            width: 250px;
            font-family: inherit;
            border-radius: 4px;
        }
        .enter-button {
            background-color: #e0e0e0;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            min-height: 44px;
        }
        #errorMessage {
            display: none;
            color: #ff4444;
            margin-top: 10px;
            text-align: center;
        }
        #successPage {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
        }
        #successPage h1 {
            font-size: 44px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #fff;
        }
        #successPage a {
            font-size: 22px;
            color: #222;
            background: #e0e0e0;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Special Elite', monospace;
            font-weight: bold;
            transition: background .2s;
        }
        #successPage a:hover {
            background: #bfbf98;
        }
    </style>
</head>
<body>
    <div id="passwordPage">
        <div class="header">ENTER WEBSITE PASSWORD:</div>
        <div class="login-container">
            <input type="password" id="passwordInput">
            <button class="enter-button" onclick="checkPassword()">Enter</button>
        </div>
        <div id="errorMessage">incorrect password try again</div>
    </div>
    <div id="successPage">
        <h1>CLICK ME</h1>
        <a href="https://youtu.be/h6qlaPkHm9g" target="_blank">https://youtu.be/h6qlaPkHm9g</a>
    </div>
    <script>
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === 'sum25') {
                document.getElementById('passwordPage').style.display = 'none';
                document.getElementById('successPage').style.display = 'flex';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }
        document.getElementById('passwordInput').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
